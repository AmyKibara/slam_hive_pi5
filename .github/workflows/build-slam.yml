name: Build Native ARM64 SLAM Hive Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger this manually

jobs:
  build-and-push:
    # Use GitHub's native ARM64 runner to bypass QEMU completely
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clone SLAM Hive Core Algorithm
        run: |
          rm -rf orb-slam3-ros-mono
          git clone https://github.com/SLAM-Hive/orb-slam3-ros-mono.git orb-slam3-ros-mono

      - name: Patch Dockerfile and Build Scripts
        run: |
          cd orb-slam3-ros-mono
          
          # 1. Optimize compilation threads for the cloud environment (8GB RAM available)
          sed -i 's/make -j4/make -j2/g' ORB_SLAM3/build.sh
          sed -i 's/make -j2/make -j2/g' ORB_SLAM3/build.sh
          sed -i 's/make/make -j2/g' ORB_SLAM3/build_ros.sh
          sed -i 's/make -j2/make -j2/g' Dockerfile

          # 2. Use Python to cleanly rebuild the Dockerfile syntax and inject EOL repositories
          python3 -c "
          with open('Dockerfile', 'r') as f:
              content = f.read()

          # Fix the pip index mirror string back to standard PyPI
          content = content.replace('pip3 install -i https://pypi.tuna.tsinghua.edu.cn/simple pyyaml==6.0', 'pip3 install pyyaml==6.0')

          # Fix typos and replace python2 packages with python3 equivalents
          content = content.replace('\\tgit', 'git')
          content = content.replace('python-dev', 'python3-dev')
          content = content.replace('python-numpy', 'python3-numpy')
          content = content.replace('\\t&&', '&&')

          # Force overwrite the container's sources list to use the working EOL archive vault
          eol_sources = 'RUN echo \"deb http://old-releases.ubuntu.com/ubuntu bionic main restricted universe multiverse\\\\n\\\\\\ndeb http://old-releases.ubuntu.com/ubuntu bionic-updates main restricted universe multiverse\\\\n\\\\\\ndeb http://old-releases.ubuntu.com/ubuntu bionic-security main restricted universe multiverse\" > /etc/apt/sources.list'
          
          # Clean up any bad pre-existing source.list lines in the original file
          import re
          content = re.sub(r'RUN sh -c \"echo .?deb http:\/\/old-releases\.ubuntu\.com.*?> /etc/apt/sources.list\"', '', content, flags=re.DOTALL)
          content = re.sub(r'deb http:\/\/old-releases\.ubuntu\.com[^\n]*', '', content)

          # Safely insert the fresh EOL archive setup right before the main apt-get setup step
          if 'apt-get' in content:
              content = content.replace('RUN apt-get', eol_sources + '\nRUN apt-get', 1)

          with open('Dockerfile', 'w') as f:
              f.write(content)
          "
          
          # Quick validation dump to make sure the patches applied perfectly in your build logs
          head -n 30 Dockerfile

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./orb-slam3-ros-mono
          file: ./orb-slam3-ros-mono/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/slam-algo:orb3-pi5
            ${{ secrets.DOCKERHUB_USERNAME }}/slam-algo:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
